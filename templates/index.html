<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="color-scheme" content="dark only">
<meta name="theme-color" content="#151515">
<title>{{ config.title }}</title>
<style>
  :root { color-scheme: dark only; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #151515;
    color: #e0e0e0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 100vh; padding: 2rem;
  }
  main { max-width: 600px; width: 100%; text-align: center; }
  h1 { font-size: 2rem; font-weight: 600; margin-bottom: 1rem; }
  p { color: #888; line-height: 1.7; margin-bottom: 1.5rem; font-size: 1.05rem; }
  .links { display: flex; flex-wrap: wrap; justify-content: center; gap: 0.75rem; }
  .links a {
    color: #e0e0e0; text-decoration: none;
    background: #222; padding: 0.5rem 1rem; border-radius: 6px;
    font-size: 0.9rem; transition: background 0.2s;
  }
  .links a:hover { background: #333; }
  footer { margin-top: 3rem; color: #555; font-size: 0.85rem; }
</style>
</head>
<body>
  <main>
    <h1>{{ section.title }}</h1>
    <p>{{ section.content | safe }}</p>
    <div class="links">
      <a href="mailto:{{ config.extra.email }}">Email</a>
      <a href="https://github.com/luyii-code-1">GitHub</a>
    </div>
  </main>
  <footer>&copy; {{ now() | date(format="%Y") }} {{ config.extra.author }}</footer>
</body>
</html>
